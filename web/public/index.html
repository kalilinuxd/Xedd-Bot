<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xedd Bot — Uptime</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --cyan: #06b6d4;
      --purple: #a855f7;
      --glow-green: rgba(34, 197, 94, 0.35);
      --glow-blue: rgba(59, 130, 246, 0.35);
      --glow-red: rgba(239, 68, 68, 0.35);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .header {
      text-align: center;
    }

    .bot-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text);
    }

    .bot-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: border-color 0.4s, color 0.4s;
    }

    .status-pill.online {
      border-color: rgba(34,197,94,0.4);
      color: var(--green);
    }

    .status-pill.offline {
      border-color: rgba(239,68,68,0.3);
      color: var(--red);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .dot.online {
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--glow-green); }
      50%       { box-shadow: 0 0 0 5px transparent; }
    }

    .clock-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .clock-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .clock-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .clock-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .clock-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .clock-digits {
      font-size: clamp(48px, 13vw, 80px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      color: var(--blue);
      text-shadow: 0 0 30px var(--glow-blue), 0 0 60px rgba(59,130,246,0.15);
      line-height: 1;
      min-width: 2ch;
      transition: color 0.3s;
    }

    .clock-digits.ticking {
      animation: tickFlash 0.08s ease-out;
    }

    @keyframes tickFlash {
      0%   { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .clock-unit-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .clock-sep {
      font-size: clamp(40px, 10vw, 68px);
      font-weight: 800;
      color: var(--border);
      line-height: 1;
      margin-bottom: 18px;
      animation: blink 1s step-start infinite;
      user-select: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .footer {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<div class="wrapper">

  <div class="header">
    <div class="bot-name" id="botName">Xedd Bot</div>
    <div class="bot-sub">Facebook Messenger Bot</div>
  </div>

  <div class="status-pill offline" id="statusPill">
    <div class="dot" id="dot"></div>
    <span id="statusLabel">Connecting...</span>
  </div>

  <div class="clock-card">
    <div class="clock-label">Bot Uptime</div>
    <div class="clock-display">
      <div class="clock-unit">
        <span class="clock-digits" id="days">00</span>
        <span class="clock-unit-label">Days</span>
      </div>
      <div class="clock-sep">:</div>
      <div class="clock-unit">
        <span class="clock-digits" id="hours">00</span>
        <span class="clock-unit-label">Hours</span>
      </div>
      <div class="clock-sep">:</div>
      <div class="clock-unit">
        <span class="clock-digits" id="minutes">00</span>
        <span class="clock-unit-label">Minutes</span>
      </div>
      <div class="clock-sep">:</div>
      <div class="clock-unit">
        <span class="clock-digits" id="seconds">00</span>
        <span class="clock-unit-label">Seconds</span>
      </div>
    </div>
  </div>

  <div class="footer" id="footer">Syncing...</div>

</div>

<script>
  const pad = n => String(n).padStart(2, '0');

  let startedAt = null;
  let tickInterval = null;

  function tick() {
    if (startedAt === null) return;

    const ms = Date.now() - startedAt;
    const totalSec = Math.floor(ms / 1000);
    const secs = totalSec % 60;
    const mins = Math.floor(totalSec / 60) % 60;
    const hrs  = Math.floor(totalSec / 3600) % 24;
    const days = Math.floor(totalSec / 86400);

    const flash = el => {
      el.classList.remove('ticking');
      void el.offsetWidth;
      el.classList.add('ticking');
    };

    const dEl = document.getElementById('days');
    const hEl = document.getElementById('hours');
    const mEl = document.getElementById('minutes');
    const sEl = document.getElementById('seconds');

    const prevS = sEl.textContent;
    sEl.textContent = pad(secs);
    if (prevS !== pad(secs)) flash(sEl);

    mEl.textContent = pad(mins);
    hEl.textContent = pad(hrs);
    dEl.textContent = pad(days);
  }

  async function syncStatus() {
    try {
      const res = await fetch('/api/status');
      const d   = await res.json();

      document.getElementById('botName').textContent = d.botName || 'Xedd Bot';

      const pill  = document.getElementById('statusPill');
      const dot   = document.getElementById('dot');
      const label = document.getElementById('statusLabel');

      if (d.online) {
        pill.className  = 'status-pill online';
        dot.className   = 'dot online';
        label.textContent = 'Online';
      } else {
        pill.className  = 'status-pill offline';
        dot.className   = 'dot';
        label.textContent = 'Offline';
      }

      startedAt = Date.now() - d.uptimeMs;

      document.getElementById('footer').textContent =
        'Last synced ' + new Date().toLocaleTimeString();
    } catch {
      document.getElementById('footer').textContent = 'Connection lost — retrying...';
    }
  }

  syncStatus();
  setInterval(syncStatus, 10000);

  tick();
  tickInterval = setInterval(tick, 1000);
</script>
</body>
</html>
